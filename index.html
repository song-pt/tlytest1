<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陀螺仪遮罩 - 修复版</title>
    <style>
        :root { --primary: #007AFF; --danger: #ff3b30; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: sans-serif; }

        /* 启动遮罩 */
        #start-btn { 
            position: fixed; inset: 0; background: #000; color: #fff; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 10000; cursor: pointer;
        }

        /* 阅读器：强制换行+自动滚动 */
        #scroll-box {
            position: absolute; inset: 0; 
            padding: 100px 20px 120px 20px; 
            overflow-y: auto; z-index: 1;
        }

        /* 文字内容：默认浅色以便观察黑化过程 */
        #text-target {
            font-size: 26px; line-height: 1.6; font-weight: 800;
            word-wrap: break-word; overflow-wrap: break-word;
            text-align: justify; color: #ccc; /* 初始浅色 */
            transition: color 0.1s linear;
        }

        /* 全屏黑色层 */
        #full-black-layer {
            position: fixed; inset: 0; background: #000; 
            opacity: 0; z-index: 50; pointer-events: none;
        }

        /* 顶部 UI */
        .ui-top { position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px; }
        .btn { 
            padding: 12px 20px; border-radius: 10px; border: 1px solid #ddd; 
            background: rgba(255,255,255,0.95); font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-reset { background: var(--danger); color: #fff; border: none; }

        /* 底部数据 */
        #monitor {
            position: fixed; bottom: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: #0f0; padding: 12px;
            font-family: monospace; font-size: 13px; border-radius: 8px;
        }

        /* 弹窗 */
        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 20000; justify-content: center; align-items: center;
        }
        .modal-inner { background: #fff; padding: 25px; border-radius: 15px; width: 85%; max-width: 350px; }
        .row { margin-bottom: 15px; }
        textarea, select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .save-btn { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-btn" onclick="init()">
        <h1>点击启动测试</h1>
        <p>启用陀螺仪权限</p>
    </div>

    <div class="ui-top">
        <button class="btn" onclick="openCfg()">⚙️ 设置</button>
        <button class="btn btn-reset" onclick="reCalibrate()">↺ 重置偏转</button>
    </div>

    <div id="scroll-box">
        <div id="text-target">114514</div>
    </div>

    <div id="full-black-layer"></div>

    <div id="monitor">
        状态: <span id="m-status">就绪</span><br>
        相对偏转: <span id="m-deg">0.0</span>°<br>
        不透明度: <span id="m-op">0</span>%
    </div>

    <div id="modal" onclick="if(event.target==this) closeCfg()">
        <div class="modal-inner">
            <h3 style="margin:0 0 15px 0">测试配置</h3>
            <div class="row">
                <label style="font-size:12px; color:#666;">测试文本</label>
                <textarea id="in-text" rows="4"></textarea>
            </div>
            <div class="row">
                <label style="font-size:12px; color:#666;">遮罩模式</label>
                <select id="in-mode">
                    <option value="text">仅覆盖文字模式 (文字变黑)</option>
                    <option value="full">全屏幕覆盖模式 (全屏变黑)</option>
                </select>
            </div>
            <div style="display:flex; gap:10px;" class="row">
                <div><label style="font-size:11px;">起算角度</label><input type="number" id="in-start"></div>
                <div><label style="font-size:11px;">饱和角度</label><input type="number" id="in-full"></div>
            </div>
            <button class="save-btn" onclick="save()">保存并应用</button>
        </div>
    </div>

    <script>
        let cfg = JSON.parse(localStorage.getItem('tly_v7_final')) || {
            text: "这里是测试文字。在‘仅覆盖文字’模式下，当你旋转手机，文字会从浅灰色逐渐变成深黑色，背景保持纯白。如果文字非常多，你可以上下滑动阅读。",
            mode: 'text',
            start: 10,
            full: 30
        };

        // 核心坐标数据
        let currentAngles = { x: 0, y: 0 };
        let baseAngles = { x: 0, y: 0 };

        const target = document.getElementById('text-target');
        const fLayer = document.getElementById('full-black-layer');

        function init() {
            document.getElementById('start-btn').style.display = 'none';
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (e) => {
                    currentAngles.x = e.beta || 0;
                    currentAngles.y = e.gamma || 0;
                    render();
                }, true);
                document.getElementById('m-status').innerText = "运行中";
            } else {
                alert("硬件不支持传感器");
            }
        }

        function render() {
            // 计算相对于基准点的偏移
            const dx = currentAngles.x - baseAngles.x;
            const dy = currentAngles.y - baseAngles.y;
            const totalDeg = Math.sqrt(dx*dx + dy*dy);

            // 计算透明度权重
            let op = 0;
            if (totalDeg > cfg.start) {
                op = (totalDeg - cfg.start) / (cfg.full - cfg.start);
            }
            op = Math.min(Math.max(op, 0), 1);

            // 应用遮罩逻辑
            if (cfg.mode === 'full') {
                fLayer.style.opacity = op;
                target.style.color = '#ccc'; // 全屏模式下文字恢复浅色
            } else {
                fLayer.style.opacity = 0;
                // 文字模式核心：颜色插值 (从浅灰 204 到 纯黑 0)
                const colorVal = Math.floor(204 * (1 - op));
                target.style.color = `rgb(${colorVal}, ${colorVal}, ${colorVal})`;
            }

            // 更新监控
            document.getElementById('m-deg').innerText = totalDeg.toFixed(1);
            document.getElementById('m-op').innerText = (op * 100).toFixed(0);
        }

        // 彻底修复重置功能：重设基准零点
        function reCalibrate() {
            baseAngles.x = currentAngles.x;
            baseAngles.y = currentAngles.y;
            render();
            console.log("已将当前姿态设为零点");
        }

        function openCfg() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('in-text').value = cfg.text;
            document.getElementById('in-mode').value = cfg.mode;
            document.getElementById('in-start').value = cfg.start;
            document.getElementById('in-full').value = cfg.full;
        }

        function closeCfg() { document.getElementById('modal').style.display = 'none'; }

        function save() {
            cfg.text = document.getElementById('in-text').value;
            cfg.mode = document.getElementById('in-mode').value;
            cfg.start = parseFloat(document.getElementById('in-start').value);
            cfg.full = parseFloat(document.getElementById('in-full').value);
            localStorage.setItem('tly_v7_final', JSON.stringify(cfg));
            target.innerText = cfg.text;
            render();
            closeCfg();
        }

        // 初始化显示
        target.innerText = cfg.text;
    </script>
</body>
</html>
