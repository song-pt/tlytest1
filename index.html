<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陀螺仪精准行遮罩测试</title>
    <style>
        :root { --primary: #007AFF; --danger: #ff3b30; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: sans-serif; }

        /* 启动遮罩 */
        #start-btn { 
            position: fixed; inset: 0; background: #000; color: #fff; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 10000; cursor: pointer;
        }

        /* 阅读器容器 */
        #scroll-box {
            position: absolute; inset: 0; 
            padding: 100px 25px 120px 25px; 
            overflow-y: auto; z-index: 1;
            -webkit-overflow-scrolling: touch;
        }

        /* 文字容器：核心在于 inline 样式 */
        #text-container {
            font-size: 26px; line-height: 1.8; font-weight: 700;
            word-wrap: break-word; overflow-wrap: break-word;
            text-align: justify; color: #111;
        }

        /* 核心：行遮罩样式 */
        #text-span {
            padding: 2px 0;
            /* 允许背景在换行时断开，形成每行独立的矩形感 */
            box-decoration-break: clone;
            -webkit-box-decoration-break: clone;
            transition: background-color 0.05s linear;
        }

        /* 全屏模式黑色层 */
        #full-screen-mask {
            position: fixed; inset: 0; background: #000; 
            opacity: 0; z-index: 50; pointer-events: none;
        }

        /* 顶部 UI */
        .ui-header { position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px; }
        .btn { 
            padding: 12px 18px; border-radius: 10px; border: 1px solid #ddd; 
            background: rgba(255,255,255,0.9); font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); backdrop-filter: blur(4px);
        }
        .btn-reset { background: var(--danger); color: #fff; border: none; }

        /* 底部监控 */
        #debug-panel {
            position: fixed; bottom: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.85); color: #0f0; padding: 12px;
            font-family: monospace; font-size: 13px; border-radius: 8px;
        }

        /* 弹窗 */
        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 20000; justify-content: center; align-items: center;
        }
        .modal-body { background: #fff; padding: 25px; border-radius: 15px; width: 85%; max-width: 360px; }
        .field { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
        textarea, select, input { width: 100%; padding: 10px; border: 1px solid #eee; border-radius: 6px; box-sizing: border-box; font-size: 16px; background: #f9f9f9; }
        .save-btn { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="start-btn" onclick="startApp()">
        <h1>点击开始测试</h1>
        <p>已针对 Android Chromium 优化</p>
    </div>

    <div class="ui-header">
        <button class="btn" onclick="openSettings()">⚙️ 设置</button>
        <button class="btn btn-reset" onclick="doCalibrate()">↺ 重置偏转</button>
    </div>

    <div id="scroll-box">
        <div id="text-container">
            <span id="text-span">114514</span>
        </div>
    </div>

    <div id="full-screen-mask"></div>

    <div id="debug-panel">
        物理 X: <span id="raw-x">0</span> | Y: <span id="raw-y">0</span><br>
        相对偏转: <span id="cur-deg">0.0</span>°<br>
        黑化程度: <span id="cur-op">0</span>%
    </div>

    <div id="modal" onclick="if(event.target==this) closeSettings()">
        <div class="modal-body">
            <h3 style="margin:0 0 15px 0">测试参数设置</h3>
            <div class="field">
                <label>测试文本（自动换行/可滚动）</label>
                <textarea id="set-text" rows="4"></textarea>
            </div>
            <div class="field">
                <label>黑块模式</label>
                <select id="set-mode">
                    <option value="text">仅覆盖有字区域 (行矩形模式)</option>
                    <option value="full">覆盖全屏幕</option>
                </select>
            </div>
            <div style="display:flex; gap:10px;" class="field">
                <div><label>起算角度</label><input type="number" id="set-start"></div>
                <div><label>全黑角度</label><input type="number" id="set-full"></div>
            </div>
            <button class="save-btn" onclick="saveSettings()">应用并保存</button>
        </div>
    </div>

    <script>
        let config = JSON.parse(localStorage.getItem('tly_v8_final')) || {
            text: "这里是行遮罩测试。在‘仅覆盖有字区域’模式下，你会看到每一行文字都有一个独立的黑色背景矩形在逐渐显现。这些矩形的长度完全跟随文字长度，形成了不规则的边缘效果。即使文本很长，你也可以上下滑动阅读。",
            mode: 'text',
            start: 10,
            full: 30
        };

        // 传感器坐标系统
        let sensor = { x: 0, y: 0 };
        let zeroPoint = { x: 0, y: 0 };

        const span = document.getElementById('text-span');
        const fMask = document.getElementById('full-screen-mask');

        function startApp() {
            document.getElementById('start-btn').style.display = 'none';
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (e) => {
                    sensor.x = e.beta || 0;
                    sensor.y = e.gamma || 0;
                    process();
                }, true);
            } else {
                alert("抱歉，您的设备不支持陀螺仪");
            }
        }

        function process() {
            // 1. 计算相对于重置点的绝对偏移量
            const dx = sensor.x - zeroPoint.x;
            const dy = sensor.y - zeroPoint.y;
            const dist = Math.sqrt(dx*dx + dy*dy);

            // 2. 计算透明度百分比 (0 到 1)
            let opacity = 0;
            if (dist > config.start) {
                opacity = (dist - config.start) / (config.full - config.start);
            }
            // 严格限速，防止回弹
            opacity = Math.max(0, Math.min(1, opacity));

            // 3. 应用视觉效果
            if (config.mode === 'full') {
                fMask.style.opacity = opacity;
                span.style.backgroundColor = 'transparent';
            } else {
                fMask.style.opacity = 0;
                // 仅覆盖有字的地方：改变 span 的背景色
                span.style.backgroundColor = `rgba(0, 0, 0, ${opacity})`;
                // 为了让文字在变黑后彻底看不见，也可以微调文字颜色
                if(opacity > 0.8) span.style.color = `rgba(0,0,0,${opacity})`;
                else span.style.color = '#111';
            }

            // 4. 更新监控面板
            document.getElementById('raw-x').innerText = sensor.x.toFixed(0);
            document.getElementById('raw-y').innerText = sensor.y.toFixed(0);
            document.getElementById('cur-deg').innerText = dist.toFixed(1);
            document.getElementById('cur-op').innerText = (opacity * 100).toFixed(0);
        }

        // 核心修复：真正的物理对准重置
        function doCalibrate() {
            zeroPoint.x = sensor.x;
            zeroPoint.y = sensor.y;
            process();
            // 简单的震动反馈（如果设备支持）
            if(navigator.vibrate) navigator.vibrate(50);
        }

        function openSettings() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('set-text').value = config.text;
            document.getElementById('set-mode').value = config.mode;
            document.getElementById('set-start').value = config.start;
            document.getElementById('set-full').value = config.full;
        }

        function closeSettings() { document.getElementById('modal').style.display = 'none'; }

        function saveSettings() {
            config.text = document.getElementById('set-text').value;
            config.mode = document.getElementById('set-mode').value;
            config.start = parseFloat(document.getElementById('set-start').value);
            config.full = parseFloat(document.getElementById('set-full').value);
            localStorage.setItem('tly_v8_final', JSON.stringify(config));
            span.innerText = config.text;
            process();
            closeSettings();
        }

        // 初始化显示内容
        span.innerText = config.text;
    </script>
</body>
</html>
