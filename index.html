<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陀螺仪遮罩测试 - 黑色版</title>
    <style>
        :root { --primary: #007AFF; --danger: #ff3b30; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: system-ui, -apple-system; }

        /* 激活层 */
        #start-btn { 
            position: fixed; inset: 0; background: #000; color: #fff; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 9999; cursor: pointer; text-align: center;
        }

        /* 基础布局 */
        #main-container {
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 1;
        }

        /* 文字显示区域（阅读器模式） */
        #text-box {
            position: relative;
            width: 85%; max-height: 70%; 
            padding: 30px; box-sizing: border-box;
            background: #f9f9f9; border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow-y: auto; /* 允许滚动 */
            word-break: break-all; /* 强制换行 */
            white-space: pre-wrap;
            font-size: 24px; line-height: 1.6; color: #111;
        }

        /* 全屏黑色遮罩 */
        #full-mask {
            position: fixed; inset: 0; background: #000; 
            opacity: 0; z-index: 50; pointer-events: none;
            transition: opacity 0.05s linear;
        }

        /* 仅文字区域遮罩 */
        #local-mask {
            position: absolute; inset: 0; background: #000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.05s linear;
        }

        /* 控制按钮 */
        .top-ui { position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px; }
        .btn { 
            padding: 10px 16px; border-radius: 8px; border: 1px solid #ccc; 
            background: rgba(255,255,255,0.9); font-weight: bold; cursor: pointer;
            backdrop-filter: blur(4px);
        }
        .btn-reset { background: var(--danger); color: #fff; border: none; }

        /* 数据监视 */
        #data-info {
            position: fixed; bottom: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.8); color: #0f0; padding: 10px;
            font-family: monospace; font-size: 11px; border-radius: 6px; pointer-events: none;
        }

        /* 设置弹窗 */
        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 10001; justify-content: center; align-items: center;
        }
        .modal-content { background: #fff; padding: 25px; border-radius: 16px; width: 85%; max-width: 360px; }
        .form-item { margin-bottom: 15px; }
        .form-item label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        textarea { height: 100px; resize: none; }
        .save-btn { width: 100%; padding: 12px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="start-btn" onclick="activate()">
        <h1>点击启动测试</h1>
        <p>必须点击屏幕以激活传感器</p>
    </div>

    <div class="top-ui">
        <button class="btn" onclick="showSet()">⚙️ 设置</button>
        <button class="btn btn-reset" onclick="resetDeg()">↺ 重置偏转</button>
    </div>

    <div id="main-container">
        <div id="text-box">
            <div id="local-mask"></div>
            <div id="content-render">114514</div>
        </div>
    </div>

    <div id="full-mask"></div>

    <div id="data-info">
        合矢量: <span id="val-deg">0</span>° | 透明度: <span id="val-op">0</span>%
    </div>

    <div id="modal" onclick="if(event.target==this) hideSet()">
        <div class="modal-content">
            <h3 style="margin:0 0 15px 0">参数配置</h3>
            <div class="form-item">
                <label>显示内容（支持长文本滚动）</label>
                <textarea id="ipt-text"></textarea>
            </div>
            <div class="form-item">
                <label>遮罩模式</label>
                <select id="ipt-mode">
                    <option value="full">全屏幕覆盖</option>
                    <option value="local">仅文字区域覆盖</option>
                </select>
            </div>
            <div style="display:flex; gap:10px;">
                <div class="form-item">
                    <label>起算角度</label>
                    <input type="number" id="ipt-start">
                </div>
                <div class="form-item">
                    <label>全黑角度</label>
                    <input type="number" id="ipt-full">
                </div>
            </div>
            <button class="save-btn" onclick="save()">保存配置</button>
        </div>
    </div>

    <script>
        let cfg = JSON.parse(localStorage.getItem('tly_v5_cfg')) || {
            text: "这里是测试内容，你可以输入非常长的文字来测试自动换行和上下滚动的功能。当内容超过屏幕显示范围时，你可以像阅读器一样进行操作。",
            start: 10,
            full: 25,
            mode: 'full'
        };

        const fMask = document.getElementById('full-mask');
        const lMask = document.getElementById('local-mask');
        const render = document.getElementById('content-render');

        function applyCfg() {
            render.innerText = cfg.text;
        }

        function activate() {
            document.getElementById('start-btn').style.display = 'none';
            if (typeof DeviceOrientationEvent !== 'undefined') {
                window.addEventListener('deviceorientation', (e) => {
                    const x = e.beta || 0;
                    const y = e.gamma || 0;
                    const total = Math.sqrt(x*x + y*y);

                    let op = 0;
                    if (total > cfg.start) {
                        op = (total - cfg.start) / (cfg.full - cfg.start);
                    }
                    op = Math.min(Math.max(op, 0), 1);

                    // 根据模式应用遮罩
                    if (cfg.mode === 'full') {
                        fMask.style.opacity = op;
                        lMask.style.opacity = 0;
                    } else {
                        lMask.style.opacity = op;
                        fMask.style.opacity = 0;
                    }

                    document.getElementById('val-deg').innerText = total.toFixed(1);
                    document.getElementById('val-op').innerText = (op * 100).toFixed(0);
                }, true);
            }
        }

        function resetDeg() {
            // 重置视觉效果（物理传感器通常无法软件清零，这里清除UI状态）
            fMask.style.opacity = 0;
            lMask.style.opacity = 0;
            console.log("偏转视觉状态已重置");
        }

        function showSet() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('ipt-text').value = cfg.text;
            document.getElementById('ipt-mode').value = cfg.mode;
            document.getElementById('ipt-start').value = cfg.start;
            document.getElementById('ipt-full').value = cfg.full;
        }

        function hideSet() { document.getElementById('modal').style.display = 'none'; }

        function save() {
            cfg.text = document.getElementById('ipt-text').value;
            cfg.mode = document.getElementById('ipt-mode').value;
            cfg.start = parseFloat(document.getElementById('ipt-start').value);
            cfg.full = parseFloat(document.getElementById('ipt-full').value);
            
            localStorage.setItem('tly_v5_cfg', JSON.stringify(cfg));
            applyCfg();
            hideSet();
        }

        applyCfg();
    </script>
</body>
</html>
