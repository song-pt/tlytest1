<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陀螺仪全能遮罩 - 终极修复版</title>
    <style>
        :root { --primary: #007AFF; --danger: #ff3b30; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: -apple-system, sans-serif; }

        /* 启动授权层 */
        #start-btn { 
            position: fixed; inset: 0; background: #000; color: #fff; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 2000000; cursor: pointer; text-align: center;
        }

        #stage { position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; padding: 80px 20px; z-index: 1; }
        .content-item { width: 100%; height: 100%; display: none; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee; }
        #scroll-box { width: 100%; height: 100%; overflow-y: auto; }
        #text-span { font-size: 26px; line-height: 1.6; font-weight: 700; color: #111; box-decoration-break: clone; -webkit-box-decoration-break: clone; transition: background-color 0.05s linear, box-shadow 0.05s linear; }

        #black-mask { position: fixed; inset: 0; background: #000; opacity: 0; z-index: 1000000; pointer-events: none; }

        .ui-header { position: fixed; top: 15px; left: 15px; z-index: 1000001; display: flex; gap: 10px; }
        .btn { padding: 10px 20px; border-radius: 10px; border: 1px solid #ddd; background: rgba(255,255,255,0.95); font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); }
        .btn-reset { background: var(--danger); color: #fff; border: none; }

        #monitor { display: none; position: fixed; bottom: 15px; left: 15px; z-index: 1000001; background: rgba(0,0,0,0.85); color: #0f0; padding: 12px; font-family: monospace; font-size: 11px; border-radius: 8px; }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 3000000; justify-content: center; align-items: center; }
        .modal-inner { background: #fff; padding: 20px; border-radius: 20px; width: 90%; max-width: 420px; max-height: 85vh; overflow-y: auto; }
        .group { margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 12px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 6px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .save-btn { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="start-btn" onclick="askPermission()">
        <h1>点击启动系统</h1>
        <p>iOS 用户请在弹窗点击“允许”</p>
    </div>

    <div class="ui-header">
        <button class="btn" onclick="openSet()">⚙️ 设置</button>
        <button class="btn btn-reset" onclick="cali()">↺ 重置偏转</button>
    </div>

    <div id="stage">
        <video id="v-player" class="content-item" controls playsinline></video>
        <iframe id="w-frame" class="content-item"></iframe>
        <div id="scroll-box"><span id="text-span"></span></div>
    </div>

    <div id="black-mask"></div>

    <div id="monitor">
        偏转: <span id="m-deg">0.0</span>° | 遮罩: <span id="m-op">0</span>%
    </div>

    <div id="modal" onclick="if(event.target==this) closeSet()">
        <div class="modal-inner">
            <h3 style="margin:0 0 15px 0">系统配置</h3>
            <div class="group"><label>长文本</label><textarea id="ipt-text" rows="3"></textarea></div>
            <div class="group"><label>网页 URL</label><input type="text" id="ipt-web"></div>
            <div class="group"><label>视频源</label><input type="file" onchange="upVid(this)"><input type="text" id="ipt-vid" placeholder="MP4 链接"></div>
            <div class="group" style="display:flex; gap:10px;">
                <div><label>起算角</label><input type="number" id="ipt-start"></div>
                <div><label>全黑角</label><input type="number" id="ipt-full"></div>
            </div>
            <div class="group">
                <select id="ipt-mode"><option value="text">行块模式</option><option value="full">全屏模式</option></select>
                <div style="margin-top:10px;"><input type="checkbox" id="ipt-debug"> 开启监控面板</div>
            </div>
            <button class="save-btn" onclick="save()">保存并应用</button>
            <button class="btn" style="width:100%; border:none; margin-top:8px;" onclick="clearAll()">清空媒体</button>
        </div>
    </div>

    <script>
        let cfg = JSON.parse(localStorage.getItem('tly_final_v14')) || {
            text: "默认测试文本...", start: 10, full: 25, mode: 'text', debug: false
        };
        let cur = {a:0, b:0, g:0}, zero = {a:0, b:0, g:0}, active = 'none';
        const v = document.getElementById('v-player'), w = document.getElementById('w-frame'), 
              s = document.getElementById('text-span'), m = document.getElementById('black-mask');

        function askPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => { if(res === 'granted') run(); else alert("权限拒绝"); }).catch(alert);
            } else { run(); }
        }

        function run() {
            document.getElementById('start-btn').style.display = 'none';
            window.addEventListener('deviceorientation', (e) => { cur.a=e.alpha||0; cur.b=e.beta||0; cur.g=e.gamma||0; render(); }, true);
            refresh();
        }

        function render() {
            let da = cur.a - zero.a; if(da > 180) da -= 360; if(da < -180) da += 360;
            const deg = Math.sqrt(da*da*0.1 + (cur.b-zero.b)**2 + (cur.g-zero.g)**2);
            let op = Math.max(0, Math.min(1, (deg - cfg.start) / (cfg.full - cfg.start)));
            const color = `rgba(0, 0, 0, ${op})`;

            if (active !== 'none' || cfg.mode === 'full') {
                m.style.opacity = op; s.style.backgroundColor = 'transparent'; s.style.boxShadow = 'none';
            } else {
                m.style.opacity = 0; s.style.backgroundColor = color;
                s.style.boxShadow = `0 5px 0 ${color}, 0 -5px 0 ${color}`;
                s.style.color = op > 0.9 ? '#000' : '#111';
            }
            if (cfg.debug) { document.getElementById('m-deg').innerText = deg.toFixed(1); document.getElementById('m-op').innerText = (op*100).toFixed(0); }
        }

        function upVid(i) { if(i.files[0]) { active='video'; v.src=URL.createObjectURL(i.files[0]); update(); } }
        function update() {
            v.style.display = active==='video'?'block':'none'; w.style.display = active==='web'?'block':'none';
            document.getElementById('scroll-box').style.display = active==='none'?'block':'none';
            if(active==='video') v.play().catch(()=>{}); render();
        }
        function cali() { zero = {...cur}; render(); }
        function openSet() {
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('ipt-text').value=cfg.text; document.getElementById('ipt-start').value=cfg.start;
            document.getElementById('ipt-full').value=cfg.full; document.getElementById('ipt-mode').value=cfg.mode;
            document.getElementById('ipt-debug').checked=cfg.debug;
        }
        function closeSet() { document.getElementById('modal').style.display = 'none'; }
        function save() {
            cfg.text=document.getElementById('ipt-text').value; cfg.start=parseFloat(document.getElementById('ipt-start').value)||10;
            cfg.full=parseFloat(document.getElementById('ipt-full').value)||25; cfg.mode=document.getElementById('ipt-mode').value;
            cfg.debug=document.getElementById('ipt-debug').checked;
            const webU=document.getElementById('ipt-web').value; const vidU=document.getElementById('ipt-vid').value;
            if(webU){ active='web'; w.src=webU; } else if(vidU){ active='video'; v.src=vidU; }
            localStorage.setItem('tly_final_v14', JSON.stringify(cfg)); refresh(); update(); closeSet();
        }
        function clearAll() { active='none'; v.src=""; w.src=""; update(); closeSet(); }
        function refresh() { document.getElementById('monitor').style.display = cfg.debug?'block':'none'; s.innerText = cfg.text; }
        s.innerText = cfg.text;
    </script>
</body>
</html>
